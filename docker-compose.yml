services:
  database:
    image: postgres:16-alpine
    container_name: fitness-database
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fitness-backend
    environment:
      DATABASE_URL: postgres://fitness:fitness@database:5432/fitness?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: fitness-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
